version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: resume-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/upload:/app/upload
      - ./backend/result:/app/result
      - ./backend/prompt:/app/prompt

  frontend:
    build:
      context: ./frontend
    container_name: resume-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

